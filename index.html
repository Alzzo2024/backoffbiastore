<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Back-off-Bia Store</title>
    <link rel="icon" type="image/png" href="images/simaoaraujologo.png">
    <link rel="icon" type="image/png" sizes="32x32" href="images/BackOffBiaStoreBlackLogo.png">
    <link rel="icon" type="image/png" sizes="16x16" href="images/BackOffBiaStoreBlackLogo.png">
    <link rel="apple-touch-icon" sizes="180x180" href="images/BackOffBiaStoreBlackLogo.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="images/BackOffBiaWhiteStoreLogo.png" alt="Logo da Loja">
        </div>
        <div class="search-bar">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Pesquisar produtos..." id="searchInput">
        </div>
        <div class="icons">
            <div class="flag">
                <select class="flag-select" id="languageSelect">
                    <option value="pt">PT</option>
                    <option value="en">EN</option>
                    <option value="es">ES</option>
                    <option value="fr">FR</option>
                </select>
            </div>
            <div class="cart">
                <i class="fas fa-shopping-bag"></i>
            </div>
            <div class="account">
                <i class="fas fa-user"></i>
            </div>
        </div>
    </header>

    <main class="products-container">
        <div class="product-card" data-category="clothes">
            <div class="product-images">
                <img src="images/product1-front.jpg" alt="Product Front View" class="active">
                <img src="images/product1-back.jpg" alt="Product Back View">
                <img src="images/product1-detail.jpg" alt="Product Detail View">
                <div class="image-nav">
                    <button class="prev">❮</button>
                    <button class="next">❯</button>
                </div>
            </div>
            <div class="product-info">
                <h3 data-translate="productName">Camiseta Premium</h3>
                <div class="price" data-price-eur="29.99">€29.99</div>
                <div class="color-selector">
                    <span data-translate="color">Cor:</span>
                    <button class="color-option" data-color="black" style="background-color: black;"></button>
                    <button class="color-option" data-color="white" style="background-color: white;"></button>
                    <button class="color-option" data-color="gray" style="background-color: gray;"></button>
                </div>
                <div class="size-selector">
                    <span data-translate="size">Tamanho:</span>
                    <select>
                        <option value="S">S</option>
                        <option value="M">M</option>
                        <option value="L">L</option>
                        <option value="XL">XL</option>
                    </select>
                </div>
                <button class="cartBtn">
                    <svg class="cart" fill="white" viewBox="0 0 576 512" height="1em" xmlns="http://www.w3.org/2000/svg">
                        <path d="M0 24C0 10.7 10.7 0 24 0H69.5c22 0 41.5 12.8 50.6 32h411c26.3 0 45.5 25 38.6 50.4l-41 152.3c-8.5 31.4-37 53.3-69.5 53.3H170.7l5.4 28.5c2.2 11.3 12.1 19.5 23.6 19.5H488c13.3 0 24 10.7 24 24s-10.7 24-24 24H199.7c-34.6 0-64.3-24.6-70.7-58.5L77.4 54.5c-.7-3.8-4-6.5-7.9-6.5H24C10.7 48 0 37.3 0 24zM128 464a48 48 0 1 1 96 0 48 48 0 1 1 -96 0zm336-48a48 48 0 1 1 0 96 48 48 0 1 1 0-96z"></path>
                    </svg>
                    <span data-translate="addToCart">ADICIONAR AO CARRINHO</span>
                </button>
            </div>
        </div>        
    </main>

    <footer>
        <div class="footer-left">
            <h3>Suporte</h3>
            <div class="footer-links">
                <a href="#" data-translate="terms">Termos de uso</a>
                <span class="dot">•</span>
                <a href="#" data-translate="refund">Política de reembolso</a>
                <span class="dot">•</span>
                <a href="#" data-translate="contact">Contato</a>
            </div>
            <div class="social-icons">
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-tiktok"></i></a>
            </div>
            <div class="copyright">
                ©2025 Back-off-Bia Store.
            </div>
        </div>
        
        <div class="footer-right">
            <div class="currency-selector">
                <select id="currencySelect">
                    <option value="EUR">EUR €</option>
                    <option value="BRL">BRL R$</option>
                    <option value="USD">USD $</option>
                    <option value="GBP">GBP £</option>
                </select>
            </div>
            <div class="payment-methods">
                <img src="images/VisaCard.png" alt="Payment Methods">
                <img src="images/MasterCardCard.png" alt="Payment Methods">
                <img src="images/PayPalCard.png" alt="Payment Methods">
                <img src="images/ApplePayCard.png" alt="Payment Methods">
                <img src="images/GooglePayCard.png" alt="Payment Methods">
            </div>
        </div>
    </footer>
</body>
</html>
